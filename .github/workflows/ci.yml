on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

name: ci

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run format -- --check

      - run: npm run lint

      - run: npm run type-check --workspaces --if-present

      - run: npm run build --workspaces --if-present

      - run: npm run generate && npm run fix

      - name: Check for generated output drift
        run: |
          if ! git diff --quiet packages/asc-sdk/src/client; then
            echo "::error::Generated SDK output is out of sync with spec. Run 'npm run generate && npm run fix' and commit."
            git diff --stat packages/asc-sdk/src/client
            exit 1
          fi

      - name: Pack SDK tarball
        run: cd packages/asc-sdk && npm pack

      - name: Install tarball in smoke test
        run: cd smoke-test && npm install ../packages/asc-sdk/bradford-tech-asc-sdk-*.tgz

      - name: Smoke test (runtime)
        run: cd smoke-test && node test.mjs

      - name: Smoke test (types)
        run: cd smoke-test && npx tsc --noEmit
