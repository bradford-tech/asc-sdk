name: Update OpenAPI Spec

on:
  schedule:
    - cron: "0 9 * * *" # Every day at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-spec
  cancel-in-progress: true

jobs:
  update-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download latest spec
        run: |
          curl -sfL -o /tmp/spec.zip "https://developer.apple.com/sample-code/app-store-connect/app-store-connect-openapi-specification.zip"
          unzip -o -j /tmp/spec.zip "openapi.oas.json" -d packages/asc-sdk/spec

      - name: Validate spec
        id: lint
        continue-on-error: true
        run: npx -y @redocly/cli@2.28.1 lint packages/asc-sdk/spec/openapi.oas.json --extends=spec --format=github-actions

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore(spec): update App Store Connect OpenAPI spec"
          title: "chore(spec): update App Store Connect OpenAPI spec"
          body: |
            The upstream App Store Connect OpenAPI specification has changed.

            This PR updates `packages/asc-sdk/spec/openapi.oas.json` to the latest version.

            **Spec validation:** ${{ steps.lint.outcome == 'success' && 'Passed' || 'Failed — review lint output in the [workflow run](https://github.com/bradford-tech/asc-sdk/actions).' }}
          branch: update-openapi-spec
          delete-branch: true
          add-paths: packages/asc-sdk/spec/openapi.oas.json
          labels: automated
          assignees: sbs44
          reviewers: sbs44
          sign-commits: true
