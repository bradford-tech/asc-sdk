on:
  push:
    branches:
      - main

name: release-please

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      sdk_released: ${{ steps.release.outputs['packages/asc-sdk--release_created'] }}
      auth_released: ${{ steps.release.outputs['packages/asc-auth--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  ci:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run format -- --check
      - run: npm run lint
      - run: npm run type-check --workspaces --if-present
      - run: npm run build --workspaces --if-present
      - run: npm test --workspaces --if-present

      - name: Pack SDK tarball
        run: cd packages/asc-sdk && npm pack

      - name: Install tarball in smoke test
        run: cd smoke-test && npm install ../packages/asc-sdk/bradford-tech-asc-sdk-*.tgz

      - name: Smoke test (runtime)
        run: cd smoke-test && node test.mjs

      - name: Smoke test (types)
        run: cd smoke-test && npx tsc --noEmit

  publish:
    needs: [release-please, ci]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspaces --if-present

      - run: npm publish --workspace packages/asc-sdk
        if: ${{ needs.release-please.outputs.sdk_released == 'true' }}

      - run: npm publish --workspace packages/asc-auth
        if: ${{ needs.release-please.outputs.auth_released == 'true' }}

      - name: Publish asc-sdk to JSR
        if: ${{ needs.release-please.outputs.sdk_released == 'true' }}
        continue-on-error: true
        run: cd packages/asc-sdk && npx jsr publish --allow-slow-types --allow-dirty

      - name: Publish asc-auth to JSR
        if: ${{ needs.release-please.outputs.auth_released == 'true' }}
        continue-on-error: true
        run: cd packages/asc-auth && npx jsr publish --allow-dirty
